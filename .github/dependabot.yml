version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '08:00'
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    groups:
      react-stack:
        patterns:
          - react
          - react-dom
          - react-router-dom
          - '@types/react*'
      vite-typescript:
        patterns:
          - vite
          - '@vitejs/*'
          - typescript
      supabase:
        patterns:
          - '@supabase/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '08:15'
      timezone: America/Sao_Paulo
